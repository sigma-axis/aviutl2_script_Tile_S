name: Make Release
on:
  push:
    tags:
    - '*'

env:
  REPOSITORY_NAME: Tile_S

  TIME_ZONE: Asia/Tokyo
  # Time zone for the timestamp when releasing.

permissions:
  contents: read

jobs:
  build:
    name: Build with aulua
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup aulua
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=$(gh api repos/karoterra/aviutl2-aulua/releases/latest --jq '.tag_name')
          archive="aulua-${tag}-windows-x64.zip"
          mkdir -p aulua
          gh release download -R karoterra/aviutl2-aulua $tag -p $archive -D aulua
          unzip aulua/$archive -d aulua
          echo `pwd`/aulua > $GITHUB_PATH

      - name: Create package
        run: aulua pack

      - name: Upload the build as artifacts
        uses: actions/upload-artifact@v7
        with:
          path: build/package.au2pkg.zip
          archive: false

  release:
    name: Create Release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: |
            README.md
          sparse-checkout-cone-mode: false

      - name: Download the package as an artifact
        uses: actions/download-artifact@v8
        with:
          path: pack
          merge-multiple: true # assuming a single artifact.
          skip-decompress: true

      - name: Prepare package
        run: |
          cd pack
          cp package.au2pkg.zip ../aviutl2_script_${{ env.REPOSITORY_NAME }}-${{ github.ref_name }}.au2pkg.zip
        # rename .zip file for downloading if necessary.

      - name: Prepare release notes
        id: release-notes
        run: |
          echo "name=${{ github.ref_name }} ($(TZ='${{ env.TIME_ZONE }}' date +'%Y-%m-%d'))" >> $GITHUB_OUTPUT
          echo "### 更新内容" >> ReleaseNotes.txt
          phase=0
          while IFS= read -r line; do
            if [[ $phase == 0 ]]; then
              if [[ $line =~ ^##*[[:space:]]{1,}'改版履歴'[[:space:]]*$ ]]; then phase=1; fi
            elif [[ $phase == 1 ]]; then
              if [[ $line =~ ^-[[:space:]] ]]; then phase=2; fi
            elif [[ $line =~ ^(-|##*)[[:space:]] ]]; then break
            else
              printf '%s\n' "${line:2}" >> ReleaseNotes.txt
            fi
          done < README.md

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.release-notes.outputs.name }}
          files: '*.zip'
          body_path: ReleaseNotes.txt
